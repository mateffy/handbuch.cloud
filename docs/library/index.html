<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Library — handbuch.cloud</title>
        <link rel="stylesheet" href="/output.css" />
    </head>
    <body class="font-mono min-h-screen bg-zinc-100 text-gray-800">
        <div class="mx-auto max-w-3xl py-10 px-5">
            <header class="w-full flex items-start justify-between">
                <div class="text-left">
                    <a href="/" class="block">
                        <h1 class="text-3xl lowercase mb-1 font-display hover:opacity-75 transition-opacity">
                            Handbuch
                        </h1>
                    </a>
                    <p class="text-lg text-zinc-500">
                        curated documentation <br />for AI coding agents
                    </p>
                </div>

                <nav>
                    <ul class="text-right space-y-2">
                        <li><a href="/library" class="hover:underline hover:opacity-75">Library</a></li>
                        <li><a href="/" class="hover:underline hover:opacity-75">Search</a></li>
                        <li><a href="https://github.com/mateffy/handbuch" target="_blank" class="hover:underline hover:opacity-75">GitHub</a></li>
                    </ul>
                </nav>
            </header>

            <div class="flex flex-col w-full py-18">
                <div class="mb-6">
                    <h2 class="text-2xl font-display font-bold text-gray-800 mb-1">Library</h2>
                    <p class="text-zinc-500">Browse all <span id="package-count">0 packages</span> in the collection.</p>
                </div>

                <div id="library-filters" class="flex flex-wrap items-center gap-2 w-full mb-6">
                    <input
                        id="filter-search"
                        type="search"
                        placeholder="Filter by name…"
                        class="flex-1 min-w-[200px] h-10 text-base px-3 bg-white border-zinc-200 border shadow-inner ring-zinc-300 focus:ring-1 focus:outline-none"
                    />
                    <select
                        id="filter-registry"
                        class="text-base h-10 px-2 pr-4 bg-white border-zinc-200 border shadow-inner ring-zinc-300 focus:ring-1 focus:outline-none"
                    >
                        <option value="">All registries</option>
                        <option value="npm">NPM</option>
                        <option value="packagist">Packagist</option>
                        <option value="cargo">Cargo</option>
                    </select>
                    <select
                        id="filter-category"
                        class="text-base h-10 px-2 pr-4 bg-white border-zinc-200 border shadow-inner ring-zinc-300 focus:ring-1 focus:outline-none"
                    >
                        <option value="">All categories</option>
                    </select>
                </div>

                <div id="library-loading" class="hidden">
                    <div class="flex items-center gap-3 text-zinc-500 py-8">
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span class="text-base">Loading packages…</span>
                    </div>
                </div>

                <div id="package-list" class="text-sm/6 text-zinc-500">
                    <!-- Populated by library-app.ts -->
                </div>
            </div>
        </div>

        <script type="module" src="/dist/library-app.js"></script>
    </body>
</html>
